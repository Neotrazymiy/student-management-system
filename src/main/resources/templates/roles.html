<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Roles</title>
<link rel="stylesheet"
	th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
</head>
<body>
	<div>
		<h2>Roles</h2>
		<table>
			<thead>
				<tr>
					<th>ID</th>
					<th>Роли</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="role : ${pageRole.content}">
					<td th:text="${role.id}"></td>
					<td th:text="${role.name}"></td>
				</tr>
			</tbody>
		</table>
		<ul th:replace="pagination :: content">
		</ul>
		<h1>
			<a th:href="@{/}">Home</a>
		</h1>
	</div>
</body>
</html>
