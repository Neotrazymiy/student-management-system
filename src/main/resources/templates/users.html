<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Users</title>
<link rel="stylesheet"
	th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
</head>
<body>
	<div>
		<h2>Users</h2>
		<table>
			<thead>
				<tr>
					<th>Id</th>
					<th>UserName</th>
					<th>Email</th>
					<th>Password</th>
					<th>Enabled</th>
					<th>FirstName</th>
					<th>LastName</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="u : ${pageUser.content}">
					<td th:text="${u.id}"></td>
					<td th:text="${u.userName}"></td>
					<td th:text="${u.email}"></td>
					<td th:text="${u.passwordHash}"></td>
					<td th:text="${u.enabled}"></td>
					<td th:text="${u.firstName}"></td>
					<td th:text="${u.lastName}"></td>
				</tr>
			</tbody>
		</table>
		<ul th:replace="pagination :: content">
		</ul>
		<h1>
			<a th:href="@{/}">Home</a>
		</h1>
	</div>
</body>
</html>
